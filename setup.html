<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>초기 설정 | ITQ 채점</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f4f8; }
    .box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
    h2 { color: #1a56db; margin-bottom: 12px; }
    p { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
    button { padding: 14px 40px; background: #1a56db; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin: 6px; }
    .btn-force { background: #dc2626 !important; font-size: 13px; padding: 10px 24px; }
    #log { margin-top: 20px; text-align: left; font-size: 13px; color: #374151; line-height: 1.8; }
    .ok { color: #16a34a; }
    .err { color: #dc2626; }
  </style>
</head>
<body>
  <div class="box">
    <h2>초기 수강생 등록</h2>
    <p>최초 1회만 실행하세요.<br>Firebase에 수강생 14명을 등록합니다.</p>
    <button onclick="setup(false)">등록 시작</button>
    <br>
    <button class="btn-force" onclick="setup(true)">기존 삭제 후 재등록</button>
    <div id="log"></div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const students = [
      "부미영","이순자","김순희","이영구","김복희",
      "김찬규","오영순","고용준","김희선","정범수",
      "손용호","지영하","고경자","정소라"
    ];

    window.setup = async function(force = false) {
      const log = document.getElementById('log');
      log.innerHTML = '';

      const snap = await getDocs(collection(db, 'students'));

      if (snap.size > 0 && !force) {
        log.innerHTML = '<span class="err">이미 수강생이 등록되어 있습니다. 재등록하려면 빨간 버튼을 사용하세요.</span>';
        return;
      }

      // 기존 데이터 삭제
      if (force && snap.size > 0) {
        log.innerHTML = '<div>기존 수강생 데이터 삭제 중...</div>';
        for (const d of snap.docs) {
          await deleteDoc(doc(db, 'students', d.id));
        }
        log.innerHTML += '<div class="ok">기존 데이터 삭제 완료</div>';
      }

      for (const name of students) {
        try {
          await addDoc(collection(db, 'students'), { name, active: true, createdAt: new Date().toISOString() });
          log.innerHTML += `<div class="ok">✓ ${name} 등록 완료</div>`;
        } catch(e) {
          log.innerHTML += `<div class="err">✗ ${name} 실패: ${e.message}</div>`;
        }
      }
      log.innerHTML += '<div style="margin-top:12px;font-weight:700;color:#1a56db">완료! 이 페이지는 닫아도 됩니다.</div>';
    };
  </script>
</body>
</html>
